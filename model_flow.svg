<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <rect x="0" y="0" width="900" height="320" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- User Request -->
  <rect x="20" y="120" width="160" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="100" y="144" text-anchor="middle" font-size="13" fill="#1e293b">User types</text>
  <text x="100" y="160" text-anchor="middle" font-size="12" fill="#475569">a request</text>

  <!-- Model box -->
  <rect x="240" y="120" width="180" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="330" y="144" text-anchor="middle" font-size="12" fill="#1e293b">Ollama Model</text>
  <text x="330" y="160" text-anchor="middle" font-size="11" fill="#475569">decides which tool to call</text>

  <!-- Tool box -->
  <rect x="480" y="120" width="200" height="60" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="580" y="140" text-anchor="middle" font-size="12" fill="#1e293b">Tool Executes</text>
  <text x="580" y="155" text-anchor="middle" font-size="11" fill="#475569">read_file / write_file / run_command</text>
  <text x="580" y="169" text-anchor="middle" font-size="10" fill="#475569">safe_path() checks the workspace</text>

  <!-- Result box -->
  <rect x="740" y="120" width="140" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="810" y="144" text-anchor="middle" font-size="12" fill="#1e293b">Result printed</text>
  <text x="810" y="160" text-anchor="middle" font-size="11" fill="#475569">in terminal</text>

  <!-- Backup note -->
  <rect x="480" y="220" width="200" height="50" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="580" y="240" text-anchor="middle" font-size="11" fill="#92400e">If overwriting a file,</text>
  <text x="580" y="255" text-anchor="middle" font-size="11" fill="#92400e">a timestamped backup is made first</text>

  <!-- static arrows -->
  <line x1="180" y1="150" x2="238" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="150" x2="478" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="150" x2="738" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="180" x2="580" y2="218" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <polyline points="810,180 810,270 100,270 100,182" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="455" y="290" text-anchor="middle" font-size="10" fill="#64748b">loops back for the next tool call or the final answer</text>

  <!-- moving dot: one request may take several trips model -> tool before the final answer -->
  <circle r="7" fill="#16a34a">
    <animateMotion
      dur="6s"
      repeatCount="indefinite"
      path="M100,150 L330,150 L580,150 L330,150 L580,150 L810,150 L810,270 L100,270 L100,150" />
  </circle>

</svg>
