<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <rect x="0" y="0" width="900" height="380" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Read Code -->
  <rect x="20" y="150" width="130" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="85" y="175" text-anchor="middle" font-size="12" fill="#1e293b">read_file</text>
  <text x="85" y="191" text-anchor="middle" font-size="10" fill="#475569">read the code</text>

  <!-- Run Code -->
  <rect x="200" y="150" width="130" height="60" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="265" y="175" text-anchor="middle" font-size="12" fill="#1e293b">run_file</text>
  <text x="265" y="191" text-anchor="middle" font-size="10" fill="#475569">execute it</text>

  <!-- Detect Error -->
  <rect x="380" y="150" width="140" height="60" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="172" text-anchor="middle" font-size="12" fill="#1e293b">Detect Error</text>
  <text x="450" y="188" text-anchor="middle" font-size="10" fill="#475569">check output/memory</text>

  <!-- Ask model for fix -->
  <rect x="580" y="150" width="140" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="650" y="172" text-anchor="middle" font-size="12" fill="#1e293b">Model proposes</text>
  <text x="650" y="188" text-anchor="middle" font-size="10" fill="#475569">a fix</text>

  <!-- Backup + Apply Fix -->
  <rect x="580" y="260" width="140" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="650" y="282" text-anchor="middle" font-size="12" fill="#1e293b">edit_file</text>
  <text x="650" y="298" text-anchor="middle" font-size="10" fill="#475569">backup, then apply</text>

  <!-- Run again -->
  <rect x="380" y="260" width="140" height="60" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="450" y="282" text-anchor="middle" font-size="12" fill="#1e293b">run_file again</text>
  <text x="450" y="298" text-anchor="middle" font-size="10" fill="#475569">confirm the fix</text>

  <!-- Final Result -->
  <rect x="200" y="260" width="140" height="60" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="270" y="282" text-anchor="middle" font-size="12" fill="#1e293b">Final Result</text>
  <text x="270" y="298" text-anchor="middle" font-size="10" fill="#475569">reported to user</text>

  <!-- static arrows -->
  <line x1="150" y1="180" x2="198" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="180" x2="378" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="180" x2="578" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="210" x2="650" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="290" x2="522" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="290" x2="342" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- loop-back arrow if the fix didn't work -->
  <polyline points="450,260 450,225 450,210" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="500" y="230" text-anchor="middle" font-size="9" fill="#dc2626">still broken? repeat</text>

  <text x="450" y="345" text-anchor="middle" font-size="11" fill="#475569">Read Code → Run Code → Detect Error → Model Fix → Backup + Apply → Run Again → Final Result</text>

  <!-- moving dot follows the whole cycle -->
  <circle r="7" fill="#16a34a">
    <animateMotion
      dur="7s"
      repeatCount="indefinite"
      path="M85,180 L265,180 L450,180 L650,180 L650,290 L450,290 L270,290 L270,290" />
  </circle>

</svg>
